name: ci

on:
  push:
  pull_request:

jobs:
  build-test:
    name: build+test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset dev
      - name: Build
        run: cmake --build --preset dev
      - name: Test
        run: ctest --preset dev

  sanitizers:
    name: asan+ubsan (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset asan
      - name: Build
        run: cmake --build --preset asan
      - name: Test
        run: ctest --preset asan

  zero-alloc:
    name: zero-alloc (linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake --preset dev
      - name: Build guard
        run: cmake --build --preset dev --target eib_zalloc_check
      - name: Run guard
        run: build/dev/apps/eib_zalloc_check

  research:
    name: research (python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Self test the honest-evaluation machine
        working-directory: research
        run: python3 -m unittest discover -v

  fuzz:
    name: fuzz-itch (linux, clang)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure
        run: cmake -S . -B build/fuzz -DEIB_FUZZ=ON -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=Debug
      - name: Build
        run: cmake --build build/fuzz --target fuzz_itch
      - name: Fuzz 30s
        env:
          UBSAN_OPTIONS: halt_on_error=1:print_stacktrace=1
        run: build/fuzz/fuzz/fuzz_itch -max_total_time=30 -print_final_stats=1
